name: Run Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"   # har 5 min baad run hoga

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Start Bot
        run: |
          npm start
